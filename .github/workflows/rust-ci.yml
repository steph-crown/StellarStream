name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/Contract-V1
            contracts/Contract-V2

      - name: Build Contract-V1 WASM
        run: cargo build --target wasm32v1-none --release
        working-directory: contracts/Contract-V1

      - name: Check formatting (V1)
        run: cargo fmt --all -- --check
        working-directory: contracts/Contract-V1

      - name: Check formatting (V2)
        run: cargo fmt --all -- --check
        working-directory: contracts/Contract-V2

      - name: Run clippy (V1)
        run: cargo clippy -- -D warnings
        working-directory: contracts/Contract-V1

      - name: Run clippy (V2)
        run: cargo clippy -- -D warnings
        working-directory: contracts/Contract-V2

      - name: Run tests (V1)
        run: cargo test
        working-directory: contracts/Contract-V1

      - name: Run tests (V2)
        run: cargo test
        working-directory: contracts/Contract-V2